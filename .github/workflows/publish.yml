name: 發布新聞到 WordPress 和 Facebook

on:
  issue_comment:
    types: [created]

jobs:
  publish-to-wordpress:
    if: contains(github.event.comment.body, 'PUBLISH_CONFIRM')
    runs-on: ubuntu-latest

    steps:
      - name: 發布新聞到 WordPress 和 Facebook
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: "1126727350526465"
          COMMENT_BODY: ${{ github.event.comment.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, urllib.request, urllib.error, urllib.parse, base64

          comment_body = os.environ.get('COMMENT_BODY', '')
          wp_url = os.environ.get('WP_URL', '').rstrip('/')
          wp_username = os.environ.get('WP_USERNAME', '')
          wp_app_password = os.environ.get('WP_APP_PASSWORD', '')
          fb_token = os.environ.get('FB_PAGE_TOKEN', '')
          fb_page_id = os.environ.get('FB_PAGE_ID', '')
          gh_token = os.environ.get('GH_TOKEN', '')
          repo = os.environ.get('REPO', '')
          issue_number = os.environ.get('ISSUE_NUMBER', '')

          match = re.search(r'<!-- PUBLISH_CONFIRM\n(.*?)\nEND_PUBLISH_CONFIRM -->', comment_body, re.DOTALL)
          if not match:
              print("ERROR: Could not find publish confirm data")
              exit(1)

          data = json.loads(match.group(1))
          title = data.get('title', '')
          content = data.get('content', '')
          fb_text = data.get('fb_text', '')  # FB 貼文文字

          print(f"Publishing: {title}")

          # ── 發布到 WordPress ──
          credentials = wp_username + ":" + wp_app_password
          encoded = base64.b64encode(credentials.encode('utf-8')).decode('utf-8')
          auth_header = "Basic " + encoded

          full_content = content.replace('\n', '<br>\n')
          post_data = {
              'title': title,
              'content': full_content,
              'status': 'publish'
          }

          published_url = ''
          published_id = ''

          def try_post(endpoint):
              global published_url, published_id
              req = urllib.request.Request(
                  wp_url + endpoint,
                  data=json.dumps(post_data).encode('utf-8'),
                  headers={
                      'Authorization': auth_header,
                      'Content-Type': 'application/json',
                      'Accept': 'application/json'
                  },
                  method='POST'
              )
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read().decode('utf-8'))
                  if isinstance(result, list):
                      result = result[0] if result else {}
                  published_url = str(result.get('link', ''))
                  published_id = str(result.get('id', ''))

          try:
              try_post("/wp-json/wp/v2/news")
              print(f"WP Published! ID: {published_id}")
          except urllib.error.HTTPError as e:
              print(f"/news failed: {e.code}, trying /posts...")
              try:
                  try_post("/wp-json/wp/v2/posts")
                  print(f"WP Fallback published! ID: {published_id}")
              except urllib.error.HTTPError as e2:
                  print("Both WP endpoints failed: " + e2.read().decode('utf-8'))
                  exit(1)

          # ── 發布到 Facebook ──
          fb_published_url = ''
          photos = data.get('photos', [])  # list of base64 strings

          if fb_token and fb_page_id:
              # 組合 FB 貼文內容
              if not fb_text:
                  fb_text = f"📰 {title}\n\n{content[:200]}...\n\n🔗 閱讀全文：{published_url}"
              else:
                  fb_text = fb_text + (f"\n\n🔗 閱讀全文：{published_url}" if published_url else "")

              # 先逐張上傳照片（unpublished），收集 photo_id
              media_ids = []
              for idx, b64 in enumerate(photos[:5]):  # 最多5張
                  photo_bytes = base64.b64decode(b64)
                  # multipart/form-data 手動組裝
                  boundary = f'----FormBoundary{idx}'
                  body_parts = []
                  body_parts.append(f'--{boundary}\r\nContent-Disposition: form-data; name="published"\r\n\r\nfalse'.encode())
                  body_parts.append(f'--{boundary}\r\nContent-Disposition: form-data; name="access_token"\r\n\r\n{fb_token}'.encode())
                  body_parts.append(
                      f'--{boundary}\r\nContent-Disposition: form-data; name="source"; filename="photo{idx}.jpg"\r\nContent-Type: image/jpeg\r\n\r\n'.encode()
                      + photo_bytes
                  )
                  body_parts.append(f'--{boundary}--'.encode())
                  multipart_body = b'\r\n'.join(body_parts)

                  photo_req = urllib.request.Request(
                      f"https://graph.facebook.com/v25.0/{fb_page_id}/photos",
                      data=multipart_body,
                      headers={'Content-Type': f'multipart/form-data; boundary={boundary}'},
                      method='POST'
                  )
                  try:
                      with urllib.request.urlopen(photo_req) as resp:
                          photo_result = json.loads(resp.read().decode('utf-8'))
                          photo_id = photo_result.get('id', '')
                          if photo_id:
                              media_ids.append(photo_id)
                              print(f"Photo {idx+1} uploaded: {photo_id}")
                  except urllib.error.HTTPError as e:
                      print(f"Photo {idx+1} upload failed: {e.code} - {e.read().decode('utf-8')}")

              # 發文（含圖 or 純文字）
              if media_ids:
                  fb_post_data = {
                      'message': fb_text,
                      'attached_media': json.dumps([{'media_fbid': mid} for mid in media_ids])
                  }
                  if published_url:
                      fb_post_data['link'] = published_url
              else:
                  fb_post_data = {'message': fb_text}
                  if published_url:
                      fb_post_data['link'] = published_url

              fb_req = urllib.request.Request(
                  f"https://graph.facebook.com/v25.0/{fb_page_id}/feed",
                  data=urllib.parse.urlencode(fb_post_data).encode('utf-8'),
                  headers={
                      'Authorization': f'Bearer {fb_token}',
                      'Content-Type': 'application/x-www-form-urlencoded'
                  },
                  method='POST'
              )
              try:
                  with urllib.request.urlopen(fb_req) as resp:
                      fb_result = json.loads(resp.read().decode('utf-8'))
                      fb_post_id = fb_result.get('id', '')
                      fb_published_url = f"https://www.facebook.com/{fb_post_id.replace('_', '/posts/')}"
                      print(f"FB Published! Post ID: {fb_post_id}")
              except urllib.error.HTTPError as e:
                  print(f"FB publish failed: {e.code} - {e.read().decode('utf-8')}")

          # ── 回報成功 ──
          success_body = "## ✅ 發布完成！\n\n"
          success_body += f"**文章標題：** {title}\n"
          success_body += f"**WordPress：** {published_url}\n"
          if fb_published_url:
              success_body += f"**Facebook：** {fb_published_url}\n"
          success_body += "\n> 📷 請到 WordPress 後台手動上傳照片到這篇文章。"

          comment_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{issue_number}/comments",
              data=json.dumps({"body": success_body}).encode('utf-8'),
              headers={
                  'Authorization': 'token ' + gh_token,
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github.v3+json'
              },
              method='POST'
          )
          try:
              with urllib.request.urlopen(comment_req):
                  print("Success comment posted")
          except Exception as ex:
              print("Could not post comment: " + str(ex))

          # ── 關閉 Issue ──
          close_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{issue_number}",
              data=json.dumps({"state": "closed"}).encode('utf-8'),
              headers={
                  'Authorization': 'token ' + gh_token,
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github.v3+json'
              },
              method='PATCH'
          )
          try:
              with urllib.request.urlopen(close_req):
                  print("Issue closed")
          except Exception as ex:
              print("Could not close issue: " + str(ex))

          PYEOF
