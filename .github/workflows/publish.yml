name: 發布新聞到 WordPress

on:
  issue_comment:
    types: [created]

jobs:
  publish-to-wordpress:
    if: contains(github.event.comment.body, 'PUBLISH_CONFIRM')
    runs-on: ubuntu-latest

    steps:
      - name: 發布新聞到 WordPress
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, urllib.request, urllib.error, base64

          comment_body = os.environ.get('COMMENT_BODY', '')
          wp_url = os.environ.get('WP_URL', '').rstrip('/')
          wp_username = os.environ.get('WP_USERNAME', '')
          wp_app_password = os.environ.get('WP_APP_PASSWORD', '')
          gh_token = os.environ.get('GH_TOKEN', '')
          repo = os.environ.get('REPO', '')
          issue_number = os.environ.get('ISSUE_NUMBER', '')

          match = re.search(r'<!-- PUBLISH_CONFIRM\n(.*?)\nEND_PUBLISH_CONFIRM -->', comment_body, re.DOTALL)
          if not match:
              print("ERROR: Could not find publish confirm data")
              exit(1)

          data = json.loads(match.group(1))
          title = data.get('title', '')
          content = data.get('content', '')

          print(f"Publishing: {title}")

          credentials = wp_username + ":" + wp_app_password
          encoded = base64.b64encode(credentials.encode('utf-8')).decode('utf-8')
          auth_header = "Basic " + encoded

          full_content = content.replace('\n', '<br>\n')

          post_data = {
              'title': title,
              'content': full_content,
              'status': 'publish'
          }

          published_url = ''
          published_id = ''

          def try_post(endpoint):
              global published_url, published_id
              req = urllib.request.Request(
                  wp_url + endpoint,
                  data=json.dumps(post_data).encode('utf-8'),
                  headers={
                      'Authorization': auth_header,
                      'Content-Type': 'application/json',
                      'Accept': 'application/json'
                  },
                  method='POST'
              )
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read().decode('utf-8'))
                  if isinstance(result, list):
                      result = result[0] if result else {}
                  published_url = str(result.get('link', ''))
                  published_id = str(result.get('id', ''))

          try:
              try_post("/wp-json/wp/v2/news")
              print(f"Published! ID: {published_id}")
          except urllib.error.HTTPError as e:
              print(f"/news failed: {e.code}, trying /posts...")
              try:
                  try_post("/wp-json/wp/v2/posts")
                  print(f"Fallback published! ID: {published_id}")
              except urllib.error.HTTPError as e2:
                  print("Both endpoints failed: " + e2.read().decode('utf-8'))
                  exit(1)

          # 回報成功
          success_body = "## ✅ 已成功發布到 WordPress！\n\n"
          success_body += f"**文章標題：** {title}\n"
          success_body += f"**文章網址：** {published_url}\n"
          success_body += f"**文章 ID：** {published_id}\n"
          success_body += "\n> 📷 請到 WordPress 後台手動上傳照片到這篇文章。"

          comment_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{issue_number}/comments",
              data=json.dumps({"body": success_body}).encode('utf-8'),
              headers={
                  'Authorization': 'token ' + gh_token,
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github.v3+json'
              },
              method='POST'
          )
          try:
              with urllib.request.urlopen(comment_req):
                  print("Success comment posted")
          except Exception as ex:
              print("Could not post comment: " + str(ex))

          # 關閉 Issue
          close_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{issue_number}",
              data=json.dumps({"state": "closed"}).encode('utf-8'),
              headers={
                  'Authorization': 'token ' + gh_token,
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github.v3+json'
              },
              method='PATCH'
          )
          try:
              with urllib.request.urlopen(close_req):
                  print("Issue closed")
          except Exception as ex:
              print("Could not close issue: " + str(ex))

          PYEOF
