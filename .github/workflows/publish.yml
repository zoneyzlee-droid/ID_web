name: 發布新聞到 WordPress

on:
  issue_comment:
    types: [created]

jobs:
  publish-to-wordpress:
    if: contains(github.event.comment.body, 'PUBLISH_CONFIRM')
    runs-on: ubuntu-latest

    steps:
      - name: 發布新聞到 WordPress
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, urllib.request, urllib.error, base64

          comment_body = os.environ.get('COMMENT_BODY', '')
          wp_url = os.environ.get('WP_URL', '').rstrip('/')
          wp_username = os.environ.get('WP_USERNAME', '')
          wp_app_password = os.environ.get('WP_APP_PASSWORD', '')
          gh_token = os.environ.get('GH_TOKEN', '')
          repo = os.environ.get('REPO', '')
          issue_number = os.environ.get('ISSUE_NUMBER', '')

          match = re.search(r'<!-- PUBLISH_CONFIRM\n(.*?)\nEND_PUBLISH_CONFIRM -->', comment_body, re.DOTALL)
          if not match:
              print("ERROR: Could not find publish confirm data")
              exit(1)

          data = json.loads(match.group(1))
          title = data.get('title', '')
          content = data.get('content', '')

          print("Publishing: " + title)

          credentials = wp_username + ":" + wp_app_password
          encoded = base64.b64encode(credentials.encode('utf-8')).decode('utf-8')
          auth_header = "Basic " + encoded

          full_content = content.replace('\n', '<br>\n')

          post_data = {
              'title': title,
              'content': full_content,
              'status': 'publish'
          }

          post_req = urllib.request.Request(
              wp_url + "/wp-json/wp/v2/news",
              data=json.dumps(post_data).encode('utf-8'),
              headers={
                  'Authorization': auth_header,
                  'Content-Type': 'application/json',
                  'Accept': 'application/json'
              },
              method='POST'
          )

          published_url = ''
          published_id = ''

          try:
              with urllib.request.urlopen(post_req) as resp:
                  resp_body = resp.read().decode('utf-8')
                  print("Raw response: " + resp_body[:200])
                  post_result = json.loads(resp_body)
                  # Handle both dict and list responses
                  if isinstance(post_result, list):
                      post_result = post_result[0] if post_result else {}
                  published_url = str(post_result.get('link', ''))
                  published_id = str(post_result.get('id', ''))
                  print("Published! Post ID: " + published_id)
                  print("URL: " + published_url)

          except urllib.error.HTTPError as e:
              error_body = e.read().decode('utf-8')
              print("WordPress /news failed: " + str(e.code) + " - " + error_body)
              print("Trying fallback to /posts...")

              post_req2 = urllib.request.Request(
                  wp_url + "/wp-json/wp/v2/posts",
                  data=json.dumps(post_data).encode('utf-8'),
                  headers={
                      'Authorization': auth_header,
                      'Content-Type': 'application/json',
                      'Accept': 'application/json'
                  },
                  method='POST'
              )
              try:
                  with urllib.request.urlopen(post_req2) as resp2:
                      resp_body2 = resp2.read().decode('utf-8')
                      post_result2 = json.loads(resp_body2)
                      if isinstance(post_result2, list):
                          post_result2 = post_result2[0] if post_result2 else {}
                      published_url = str(post_result2.get('link', ''))
                      published_id = str(post_result2.get('id', ''))
                      print("Fallback published! ID: " + published_id)
              except urllib.error.HTTPError as e2:
                  print("Fallback also failed: " + e2.read().decode('utf-8'))
                  exit(1)

          # Post success comment
          success_body = "## 已成功發布到 WordPress！\n\n"
          success_body += "**文章標題：** " + title + "\n"
          success_body += "**文章網址：** " + published_url + "\n"
          success_body += "**文章 ID：** " + published_id + "\n"

          comment_req = urllib.request.Request(
              "https://api.github.com/repos/" + repo + "/issues/" + issue_number + "/comments",
              data=json.dumps({"body": success_body}).encode('utf-8'),
              headers={
                  'Authorization': 'token ' + gh_token,
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github.v3+json'
              },
              method='POST'
          )
          try:
              with urllib.request.urlopen(comment_req):
                  print("Success comment posted")
          except Exception as ex:
              print("Could not post comment: " + str(ex))

          # Close issue
          close_req = urllib.request.Request(
              "https://api.github.com/repos/" + repo + "/issues/" + issue_number,
              data=json.dumps({"state": "closed"}).encode('utf-8'),
              headers={
                  'Authorization': 'token ' + gh_token,
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github.v3+json'
              },
              method='PATCH'
          )
          try:
              with urllib.request.urlopen(close_req):
                  print("Issue closed")
          except Exception as ex:
              print("Could not close issue: " + str(ex))

          PYEOF
