name: 生成新聞預覽

on:
  issues:
    types: [opened]

jobs:
  generate-preview:
    if: contains(github.event.issue.labels.*.name, 'news-publish')
    runs-on: ubuntu-latest

    steps:
      - name: 取得 Issue 內容並生成新聞稿
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, urllib.request, urllib.error

          issue_body = os.environ.get('ISSUE_BODY', '')
          gemini_key = os.environ.get('GEMINI_API_KEY', '')
          issue_number = os.environ.get('ISSUE_NUMBER', '')
          gh_token = os.environ.get('GH_TOKEN', '')
          repo = os.environ.get('REPO', '')

          # Extract JSON from issue body
          match = re.search(r'<!-- PUBLISH_DATA\n(.*?)\nEND_PUBLISH_DATA -->', issue_body, re.DOTALL)
          if not match:
              print("ERROR: Could not find publish data")
              exit(1)

          data = json.loads(match.group(1))
          keywords = data.get('keywords', '')
          audience = data.get('audience', '一般大眾')
          tone = data.get('tone', '正式學術')
          language = data.get('language', '繁體中文')

          # Build prompt
          tone_map = {
              '正式學術': '使用正式、學術的語氣，措辭嚴謹，適合對外官方公告',
              '親切溫暖': '使用親切、溫暖的語氣，貼近讀者，讓人感到友善',
              '活潑年輕': '使用活潑、年輕的語氣，充滿活力，適合吸引學生族群',
              '新聞報導式': '使用客觀的新聞報導語氣，第三人稱，事實導向'
          }
          lang_map = {
              '繁體中文': '請以繁體中文撰寫',
              '英文': 'Please write in English',
              '中英雙語': '請同時提供繁體中文版本和英文版本，先中文後英文'
          }

          tone_instruction = tone_map.get(tone, tone_map['正式學術'])
          lang_instruction = lang_map.get(language, lang_map['繁體中文'])

          prompt = "你是逢甲大學室內設計學士學位學程的新聞稿撰寫助手。\n\n"
          prompt += "請根據以下資訊，撰寫一篇完整的新聞稿：\n\n"
          prompt += "【新聞內容關鍵字/描述】\n" + keywords + "\n\n"
          prompt += "【發布對象】：" + audience + "\n"
          prompt += "【語氣要求】：" + tone_instruction + "\n"
          prompt += "【語言要求】：" + lang_instruction + "\n\n"
          prompt += "請生成：\n"
          prompt += "1. 一個吸引人的新聞標題（不超過30字）\n"
          prompt += "2. 完整的新聞內文（400~600字，包含引言、主體、結語）\n\n"
          prompt += "重要：請只回傳以下 JSON 格式，不要有任何其他文字：\n"
          prompt += '{"title": "新聞標題", "content": "完整新聞內文"}'

          # Call Gemini API
          api_url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + gemini_key

          payload = {
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {"temperature": 0.7, "maxOutputTokens": 2000}
          }

          req = urllib.request.Request(
              api_url,
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST'
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read().decode('utf-8'))
          except urllib.error.HTTPError as e:
              print("Gemini API error: " + str(e.code) + " - " + e.read().decode('utf-8'))
              exit(1)

          text = result['candidates'][0]['content']['parts'][0]['text'].strip()
          if text.startswith('```json'):
              text = text[7:]
          if text.startswith('```'):
              text = text[3:]
          if text.endswith('```'):
              text = text[:-3]
          text = text.strip()

          news_data = json.loads(text)
          print("Generated title: " + news_data.get('title', ''))

          # Post comment
          comment_body = "## AI 新聞稿已生成\n\n"
          comment_body += "**標題：** " + news_data['title'] + "\n\n---\n\n"
          comment_body += news_data['content'] + "\n\n---\n\n"
          comment_body += "> 請回到發布介面點擊「載入預覽結果」查看並編輯。\n\n"
          comment_body += "<!-- GENERATED_NEWS\n"
          comment_body += json.dumps(news_data, ensure_ascii=False)
          comment_body += "\nEND_GENERATED_NEWS -->"

          comment_url = "https://api.github.com/repos/" + repo + "/issues/" + issue_number + "/comments"
          comment_req = urllib.request.Request(
              comment_url,
              data=json.dumps({"body": comment_body}).encode('utf-8'),
              headers={
                  'Authorization': 'token ' + gh_token,
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github.v3+json'
              },
              method='POST'
          )

          with urllib.request.urlopen(comment_req) as resp:
              print("Comment posted successfully")

          PYEOF
