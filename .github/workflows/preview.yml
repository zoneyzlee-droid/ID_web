name: 生成新聞預覽

on:
  issues:
    types: [opened]

jobs:
  generate-preview:
    if: contains(github.event.issue.labels.*.name, 'news-publish')
    runs-on: ubuntu-latest

    steps:
      - name: 取得 Issue 內容並生成新聞稿
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, urllib.request, urllib.error

          issue_body = os.environ.get('ISSUE_BODY', '')
          gemini_key = os.environ.get('GEMINI_API_KEY', '')
          issue_number = os.environ.get('ISSUE_NUMBER', '')
          gh_token = os.environ.get('GH_TOKEN', '')
          repo = os.environ.get('REPO', '')

          match = re.search(r'<!-- PUBLISH_DATA\n(.*?)\nEND_PUBLISH_DATA -->', issue_body, re.DOTALL)
          if not match:
              print("ERROR: Could not find publish data")
              exit(1)

          data = json.loads(match.group(1))
          keywords = data.get('keywords', '')
          audience = data.get('audience', '一般大眾')
          tone = data.get('tone', '正式學術')
          language = data.get('language', '繁體中文')

          tone_map = {
              '正式學術': '正式學術語氣',
              '親切溫暖': '親切溫暖語氣',
              '活潑年輕': '活潑年輕語氣',
              '新聞報導式': '客觀新聞報導語氣'
          }
          lang_map = {
              '繁體中文': '繁體中文',
              '英文': 'English',
              '中英雙語': '繁體中文與英文雙語'
          }

          def call_gemini(prompt):
              payload = {
                  "contents": [{"parts": [{"text": prompt}]}],
                  "generationConfig": {"temperature": 0.7, "maxOutputTokens": 3000}
              }
              api_url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + gemini_key
              req = urllib.request.Request(
                  api_url,
                  data=json.dumps(payload).encode('utf-8'),
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read().decode('utf-8'))
              return result['candidates'][0]['content']['parts'][0]['text'].strip()

          try:
              # 新聞標題
              title_prompt = "你是逢甲大學室內設計學程新聞助手。請根據以下關鍵字，產生一個新聞標題，不超過30個字，只輸出標題文字，不要有任何其他內容：\n關鍵字：" + keywords
              title = call_gemini(title_prompt)
              print("Title: " + title)

              # 新聞內文
              content_prompt = "你是逢甲大學室內設計學程新聞助手。請根據以下資訊撰寫新聞內文，400到600字，" + tone_map.get(tone, '正式學術語氣') + "，以" + lang_map.get(language, '繁體中文') + "撰寫，對象為" + audience + "。只輸出內文，不要標題，不要任何格式符號：\n關鍵字：" + keywords
              content = call_gemini(content_prompt)
              print("Content length: " + str(len(content)))

              # FB 貼文
              fb_prompt = "你是逢甲大學室內設計學程的社群小編。請根據以下關鍵字，撰寫一則適合 Facebook 粉絲專頁的貼文，150字以內，語氣親切活潑，可以加入適當的 emoji 和 2-3 個 hashtag。只輸出貼文內容，不要其他說明：\n關鍵字：" + keywords
              fb_text = call_gemini(fb_prompt)
              print("FB text length: " + str(len(fb_text)))

          except urllib.error.HTTPError as e:
              print("Gemini error: " + str(e.code) + " - " + e.read().decode('utf-8'))
              exit(1)

          news_data = {"title": title, "content": content, "fb_text": fb_text}

          comment_body = "## AI 新聞稿已生成\n\n"
          comment_body += "**標題：** " + title + "\n\n---\n\n"
          comment_body += content + "\n\n---\n\n"
          comment_body += "**FB 貼文草稿：**\n\n" + fb_text + "\n\n---\n\n"
          comment_body += "> 請回到發布介面點擊「載入預覽結果」查看並編輯。\n\n"
          comment_body += "<!-- GENERATED_NEWS\n"
          comment_body += json.dumps(news_data, ensure_ascii=False)
          comment_body += "\nEND_GENERATED_NEWS -->"

          comment_url = "https://api.github.com/repos/" + repo + "/issues/" + issue_number + "/comments"
          comment_req = urllib.request.Request(
              comment_url,
              data=json.dumps({"body": comment_body}).encode('utf-8'),
              headers={
                  'Authorization': 'token ' + gh_token,
                  'Content-Type': 'application/json',
                  'Accept': 'application/vnd.github.v3+json'
              },
              method='POST'
          )
          with urllib.request.urlopen(comment_req) as resp:
              print("Comment posted! Status: " + str(resp.status))

          PYEOF
